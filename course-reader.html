<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Reader — LearNova</title>
    <meta name="description" content="Read course modules and track your learning progress on LearNova.">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .reader-shell {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        .reader-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--bdr-subtle);
            display: flex;
            flex-direction: column;
        }

        .reader-sidebar-top {
            padding: var(--sp-5) var(--sp-5) var(--sp-4);
            border-bottom: 1px solid var(--bdr-subtle);
            flex-shrink: 0;
        }

        .reader-back {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            font-size: var(--text-sm);
            color: var(--txt-muted);
            text-decoration: none;
            margin-bottom: var(--sp-4);
            transition: color .2s;
        }

        .reader-back:hover {
            color: var(--txt-primary);
        }

        .reader-course-title {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--txt-primary);
            line-height: 1.4;
            margin-bottom: var(--sp-3);
        }

        .reader-overall-progress {
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            font-size: var(--text-xs);
            color: var(--txt-muted);
        }

        .reader-progress-bar-track {
            flex: 1;
            height: 5px;
            background: var(--bdr-subtle);
            border-radius: 999px;
            overflow: hidden;
        }

        .reader-progress-bar-fill {
            height: 100%;
            background: var(--grad-primary);
            border-radius: 999px;
            transition: width .5s ease;
        }

        .module-list {
            flex: 1;
            padding: var(--sp-4) var(--sp-3);
            overflow-y: auto;
        }

        .module-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--txt-muted);
            padding: var(--sp-2) var(--sp-2) var(--sp-1);
        }

        .module-item {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            padding: var(--sp-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background .18s;
            margin-bottom: 2px;
        }

        .module-item:hover {
            background: var(--bg-card-hover);
        }

        .module-item.active {
            background: rgba(37, 99, 235, .12);
        }

        .module-item.active .module-item-title {
            color: var(--clr-electric);
        }

        .module-item-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
            background: var(--bdr-subtle);
            color: var(--txt-muted);
            transition: all .2s;
        }

        .module-item.done .module-item-icon {
            background: #10B981;
            color: #fff;
        }

        .module-item.active .module-item-icon {
            background: var(--clr-electric);
            color: #fff;
        }

        .module-item-info {
            flex: 1;
            min-width: 0;
        }

        .module-item-title {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--txt-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .module-item.done .module-item-title {
            color: var(--txt-muted);
        }

        .module-item-meta {
            font-size: 11px;
            color: var(--txt-muted);
            margin-top: 2px;
        }

        .reader-main {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .reader-topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--bdr-subtle);
            padding: var(--sp-3) var(--sp-8);
            display: flex;
            align-items: center;
            gap: var(--sp-4);
        }

        .reader-topbar-progress {
            flex: 1;
            height: 4px;
            background: var(--bdr-subtle);
            border-radius: 999px;
            overflow: hidden;
            max-width: 300px;
        }

        .reader-topbar-fill {
            height: 100%;
            background: var(--clr-electric);
            border-radius: 999px;
            transition: width .4s ease;
        }

        .read-progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--grad-primary);
            z-index: 9999;
            width: 0%;
            transition: width .1s linear;
        }

        .reader-doc {
            flex: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: var(--sp-12) var(--sp-8) var(--sp-16);
            width: 100%;
        }

        .reader-doc-header {
            margin-bottom: var(--sp-8);
            padding-bottom: var(--sp-6);
            border-bottom: 1px solid var(--bdr-subtle);
        }

        .reader-module-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            font-size: var(--text-xs);
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--clr-electric);
            background: rgba(37, 99, 235, .1);
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, .2);
            margin-bottom: var(--sp-4);
        }

        .reader-doc-title {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: var(--sp-3);
            color: var(--txt-primary);
        }

        .reader-doc-meta {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            font-size: var(--text-sm);
            color: var(--txt-muted);
        }

        .reader-content {
            font-size: 1rem;
            line-height: 1.85;
            color: var(--txt-secondary);
        }

        .reader-content h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--txt-primary);
            margin: var(--sp-8) 0 var(--sp-3);
        }

        .reader-content h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--txt-primary);
            margin: var(--sp-6) 0 var(--sp-2);
        }

        .reader-content h4 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--txt-primary);
            margin: var(--sp-4) 0 var(--sp-2);
        }

        .reader-content p {
            margin-bottom: var(--sp-4);
            color: var(--txt-secondary);
        }

        .reader-content ul,
        .reader-content ol {
            padding-left: var(--sp-6);
            margin-bottom: var(--sp-4);
        }

        .reader-content li {
            margin-bottom: var(--sp-2);
            color: var(--txt-secondary);
        }

        .reader-content ul {
            list-style: disc;
        }

        .reader-content ol {
            list-style: decimal;
        }

        .reader-content pre {
            background: var(--bg-sidebar);
            border: 1px solid var(--bdr-subtle);
            border-radius: var(--radius-lg);
            padding: var(--sp-5);
            overflow-x: auto;
            margin: var(--sp-4) 0;
            font-size: .875rem;
            line-height: 1.6;
        }

        .reader-content code {
            font-family: 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
            color: #60A5FA;
            font-size: .9em;
        }

        .reader-content pre code {
            color: #e2e8f0;
        }

        .reader-content blockquote {
            border-left: 4px solid var(--clr-electric);
            background: rgba(37, 99, 235, .06);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: var(--sp-4) var(--sp-5);
            margin: var(--sp-5) 0;
            font-style: italic;
            color: var(--txt-secondary);
        }

        .reader-content strong {
            color: var(--txt-primary);
            font-weight: 700;
        }

        .reader-content em {
            color: var(--clr-electric);
            font-style: normal;
        }

        .reader-bottom-nav {
            border-top: 1px solid var(--bdr-subtle);
            padding: var(--sp-6) var(--sp-8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--sp-4);
            background: var(--bg-sidebar);
        }

        .completion-banner {
            display: none;
            background: linear-gradient(135deg, #065f46, #047857);
            border: 1px solid rgba(16, 185, 129, .3);
            border-radius: var(--radius-xl);
            padding: var(--sp-6);
            text-align: center;
            margin-bottom: var(--sp-8);
            animation: fadeIn .5s ease;
        }

        .completion-banner.show {
            display: block;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
            height: 20px;
            margin-bottom: 12px;
        }

        @media (max-width:768px) {
            .reader-shell {
                grid-template-columns: 1fr;
            }

            .reader-sidebar {
                display: none;
            }

            .reader-doc {
                padding: var(--sp-6) var(--sp-4) var(--sp-12);
            }

            .reader-topbar {
                padding: var(--sp-3) var(--sp-4);
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-guard.js"></script>
</head>

<body>
    <div class="read-progress-bar" id="read-progress"></div>

    <div class="reader-shell" id="reader-shell" style="opacity:0;transition:opacity .3s">

        <!-- LEFT SIDEBAR -->
        <aside class="reader-sidebar">
            <div class="reader-sidebar-top">
                <a href="student.html" class="reader-back">← Back to Dashboard</a>
                <div class="reader-course-title" id="sidebar-course-title">Loading…</div>
                <div class="reader-overall-progress">
                    <span id="sidebar-pct">0%</span>
                    <div class="reader-progress-bar-track">
                        <div class="reader-progress-bar-fill" id="sidebar-fill" style="width:0%"></div>
                    </div>
                    <span id="sidebar-done">0/0</span>
                </div>
            </div>
            <div class="module-list" id="module-list">
                <div class="skeleton" style="margin:12px;height:40px"></div>
                <div class="skeleton" style="margin:12px;height:40px"></div>
                <div class="skeleton" style="margin:12px;height:40px"></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="reader-main">
            <div class="reader-topbar">
                <span style="font-size:var(--text-sm);color:var(--txt-muted);white-space:nowrap"
                    id="topbar-label">Module 1</span>
                <div class="reader-topbar-progress">
                    <div class="reader-topbar-fill" id="topbar-fill" style="width:0%"></div>
                </div>
                <span id="topbar-pct"
                    style="font-size:var(--text-sm);font-weight:700;color:var(--clr-electric);white-space:nowrap">0%</span>
                <button onclick="window.history.back()" class="btn btn-secondary btn-sm" style="margin-left:auto">✕
                    Exit</button>
            </div>

            <div class="reader-doc" id="reader-doc">
                <!-- Completion banner -->
                <div class="completion-banner" id="completion-banner">
                    <div style="font-size:3rem;margin-bottom:var(--sp-3)">🎉</div>
                    <h3 style="color:#fff;margin-bottom:var(--sp-2)">Module Complete!</h3>
                    <p style="color:rgba(255,255,255,.8);margin-bottom:var(--sp-4);font-size:var(--text-sm)">
                        You earned <strong id="xp-earned" style="color:#6EE7B7">+XP</strong>
                    </p>
                </div>

                <div class="reader-doc-header">
                    <div class="reader-module-badge" id="doc-badge">📖 Lesson 1</div>
                    <div class="reader-doc-title" id="doc-title">Loading module…</div>
                    <div class="reader-doc-meta">
                        <span id="doc-duration">⏱ 10 min read</span>
                        <span id="doc-type">📄 Lesson</span>
                    </div>
                </div>

                <div class="reader-content" id="doc-content">
                    <div class="skeleton" style="height:16px;width:80%"></div>
                    <div class="skeleton" style="height:16px"></div>
                    <div class="skeleton" style="height:80px;margin-top:16px"></div>
                    <div class="skeleton" style="height:16px;width:60%;margin-top:16px"></div>
                </div>
            </div>

            <div class="reader-bottom-nav">
                <button id="prev-btn" class="btn btn-secondary" onclick="navigate(-1)" disabled>← Previous</button>
                <div style="text-align:center">
                    <div style="font-size:var(--text-xs);color:var(--txt-muted);margin-bottom:4px" id="nav-hint">Scroll
                        to the bottom to auto-complete</div>
                    <!-- Page navigation for long modules -->
                    <div style="display:flex;align-items:center;justify-content:center;gap:var(--sp-3);margin-bottom:var(--sp-3)"
                        id="page-nav">
                        <button id="page-prev-btn" class="btn btn-ghost btn-sm" onclick="prevPage()"
                            style="display:none">← Prev Page</button>
                        <span id="page-indicator"
                            style="font-size:var(--text-xs);color:var(--txt-muted);min-width:80px;text-align:center"></span>
                        <button id="page-next-btn" class="btn btn-primary btn-sm" onclick="nextPage()"
                            style="display:none">Next Page →</button>
                    </div>
                    <button id="complete-btn" class="btn btn-primary" onclick="markComplete()" style="min-width:220px">✓
                        Mark Complete &amp; Continue →</button>
                </div>
                <button id="next-btn" class="btn btn-secondary" onclick="navigate(1)">Next →</button>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        //  Course Reader — Main Logic
        //  Fixed: (1) hasAutoCompleted resets per module
        //         (2) XP directly incremented in profiles (no trigger dep)
        //         (3) Course-complete banner with total XP
        // ═══════════════════════════════════════════════════════════════

        const params = new URLSearchParams(location.search);
        const courseId = params.get('course');
        const startModule = parseInt(params.get('module') || '1');

        if (!courseId) { alert('No course selected.'); location.href = 'student.html'; }

        let modules = [];
        let currentIndex = 0;
        let enrollment = null;
        let userId = null;
        let completedSet = new Set();
        let hasAutoCompleted = false;  // RESET for every module navigation

        // ── Boot ──────────────────────────────────────────────────────
        (async function init() {
            await waitForAuth();
            userId = window.LN_USER?.id;
            if (!userId) return;

            const [modRes, courseRes, enrollRes] = await Promise.all([
                supabaseClient.from('course_modules').select('*').eq('course_id', courseId).order('order_index'),
                supabaseClient.from('courses').select('title, modules_count').eq('id', courseId).single(),
                supabaseClient.from('enrollments').select('*').eq('course_id', courseId).eq('student_id', userId).single(),
            ]);

            modules = modRes.data || [];
            enrollment = enrollRes.data || null;
            const course = courseRes.data;

            if (modules.length === 0) {
                document.getElementById('doc-content').innerHTML =
                    '<p style="color:var(--txt-muted)">No modules for this course yet. Check back soon!</p>';
                document.getElementById('reader-shell').style.opacity = '1';
                return;
            }

            // Rebuild completed set from saved progress percentage
            if (enrollment && enrollment.progress_pct > 0) {
                const doneCount = Math.floor((enrollment.progress_pct / 100) * modules.length);
                for (let i = 0; i < doneCount; i++) completedSet.add(modules[i].order_index);
            }

            // Open on the last saved module (or startModule from URL)
            const targetOrder = enrollment?.current_module ?? startModule;
            currentIndex = modules.findIndex(m => m.order_index === targetOrder);
            if (currentIndex < 0) currentIndex = 0;

            document.getElementById('sidebar-course-title').textContent = course?.title || 'Course';
            document.title = (course?.title || 'Course') + ' — LearNova Reader';

            renderSidebar();
            renderModule(currentIndex);
            setupScrollTracking();
            document.getElementById('reader-shell').style.opacity = '1';
        })();

        function waitForAuth() {
            return new Promise(r => {
                if (window.LN_USER) return r();
                const t = setInterval(() => { if (window.LN_USER) { clearInterval(t); r(); } }, 50);
                setTimeout(() => { clearInterval(t); r(); }, 6000);
            });
        }

        // ── Sidebar ───────────────────────────────────────────────────
        function renderSidebar() {
            const total = modules.length;
            const done = completedSet.size;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('sidebar-pct').textContent = pct + '%';
            document.getElementById('sidebar-fill').style.width = pct + '%';
            document.getElementById('sidebar-done').textContent = `${done}/${total}`;
            document.getElementById('topbar-pct').textContent = pct + '%';
            document.getElementById('topbar-fill').style.width = pct + '%';

            const typeIcon = { lesson: '📄', quiz: '❓', exercise: '💻', video: '▶️' };
            document.getElementById('module-list').innerHTML =
                '<div class="module-section-label">Course Modules</div>' +
                modules.map((m, i) => {
                    const isDone = completedSet.has(m.order_index);
                    const isActive = i === currentIndex;
                    return `
                <div class="module-item ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}" onclick="navigate_to(${i})">
                  <div class="module-item-icon">${isDone ? '✓' : (isActive ? '▶' : m.order_index)}</div>
                  <div class="module-item-info">
                    <div class="module-item-title">${m.title}</div>
                    <div class="module-item-meta">${typeIcon[m.type] || '📄'} ${m.duration_minutes} min</div>
                  </div>
                </div>`;
                }).join('');
        }

        // ── Pagination state ───────────────────────────────────────────
        let contentPages = [];             // chunks of HTML for current module
        let currentPage = 0;

        /** Split HTML content into pages at h2/h3 boundaries or ~1500 word chunks */
        function paginateContent(html) {
            // Parse into a temp div
            const div = document.createElement('div');
            div.innerHTML = html;

            // Collect all child nodes and split at h2/h3 headings
            const children = Array.from(div.childNodes);
            const pages = [];
            let current = [];
            let wordCount = 0;

            children.forEach(node => {
                const tag = node.tagName;
                const text = node.textContent || '';
                wordCount += text.split(/\s+/).length;

                const isHeading = tag === 'H2' || tag === 'H3';
                const isBig = wordCount > 1500;

                if ((isHeading || isBig) && current.length > 0) {
                    pages.push(current.join(''));
                    current = [];
                    wordCount = text.split(/\s+/).length;
                }

                // Get outer HTML if element, otherwise text
                const nodeHtml = node.nodeType === 1 ? node.outerHTML : (node.textContent.trim() ? '<p>' + node.textContent + '</p>' : '');
                if (nodeHtml) current.push(nodeHtml);
            });

            if (current.length > 0) pages.push(current.join(''));
            return pages.length > 0 ? pages : [html]; // fallback
        }

        function renderPage(pageIndex) {
            currentPage = pageIndex;
            document.getElementById('doc-content').innerHTML = contentPages[pageIndex] || '<p>No content.</p>';

            // Update page indicator
            const totalPages = contentPages.length;
            const pageIndicator = document.getElementById('page-indicator');
            if (pageIndicator) {
                pageIndicator.textContent = totalPages > 1 ? 'Page ' + (pageIndex + 1) + ' of ' + totalPages : '';
            }

            // Show/hide prev/next page buttons
            const pagePrev = document.getElementById('page-prev-btn');
            const pageNext = document.getElementById('page-next-btn');
            if (pagePrev) pagePrev.style.display = totalPages > 1 ? 'block' : 'none';
            if (pageNext) pageNext.style.display = totalPages > 1 ? 'block' : 'none';
            if (pagePrev) pagePrev.disabled = pageIndex === 0;
            if (pageNext) pageNext.disabled = pageIndex >= totalPages - 1;

            // Show module complete button only on last page
            const completeBtn = document.getElementById('complete-btn');
            if (completeBtn) completeBtn.style.opacity = (pageIndex === totalPages - 1) ? '1' : '0.4';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.nextPage = function () { if (currentPage < contentPages.length - 1) renderPage(currentPage + 1); };
        window.prevPage = function () { if (currentPage > 0) renderPage(currentPage - 1); };

        // ── Render a specific module ───────────────────────────────────
        function renderModule(index) {
            currentIndex = index;
            hasAutoCompleted = false;   // ← CRITICAL: reset so scroll fires on each module
            currentPage = 0;

            const m = modules[index];
            if (!m) return;

            const typeLabel = { lesson: 'Lesson', quiz: 'Quiz', exercise: 'Exercise', video: 'Video' };
            const typeIcon = { lesson: '📖', quiz: '❓', exercise: '💻', video: '▶️' };

            document.getElementById('doc-badge').textContent = `${typeIcon[m.type] || '📖'} ${typeLabel[m.type] || 'Lesson'} ${m.order_index}`;
            document.getElementById('doc-title').textContent = m.title;
            document.getElementById('doc-duration').textContent = `⏱ ${m.duration_minutes} min read`;
            document.getElementById('doc-type').textContent = `📄 ${typeLabel[m.type] || 'Lesson'}`;
            document.getElementById('topbar-label').textContent = `Module ${m.order_index} of ${modules.length}`;
            document.getElementById('completion-banner').classList.remove('show');

            // Paginate content
            contentPages = paginateContent(m.content || '<p>No content yet.</p>');
            renderPage(0);

            const isDone = completedSet.has(m.order_index);
            const btn = document.getElementById('complete-btn');
            const hint = document.getElementById('nav-hint');
            const isLast = index === modules.length - 1;

            btn.disabled = false;
            if (isDone && !isLast) {
                btn.textContent = '→ Next Module';
                hint.textContent = '✓ Already completed — click to go to next';
            } else if (isDone && isLast) {
                btn.textContent = '🏆 Course Complete!';
                btn.disabled = true;
                hint.textContent = 'You have completed this entire course! 🎉';
            } else {
                btn.textContent = '✓ Mark Complete & Continue →';
                hint.textContent = 'Scroll to the bottom to auto-complete this module';
            }

            document.getElementById('prev-btn').disabled = index === 0;
            const nextBtn = document.getElementById('next-btn');
            if (index >= modules.length - 1) {
                nextBtn.textContent = '← Dashboard';
                nextBtn.onclick = () => { location.href = 'student.html'; };
                nextBtn.disabled = false;
            } else {
                nextBtn.textContent = 'Next →';
                nextBtn.onclick = () => navigate(1);
                nextBtn.disabled = false;
            }

            renderSidebar();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ── Navigation ────────────────────────────────────────────────
        window.navigate = function (delta) {
            const next = currentIndex + delta;
            if (next >= 0 && next < modules.length) navigate_to(next);
        };

        window.navigate_to = function (index) {
            renderModule(index);
            const url = new URL(location.href);
            url.searchParams.set('module', modules[index].order_index);
            history.replaceState({}, '', url);
        };

        // ── Mark Complete — FIXED version ─────────────────────────────
        window.markComplete = async function () {
            const m = modules[currentIndex];
            if (!m) return;

            // Already done → just advance
            if (completedSet.has(m.order_index)) {
                if (currentIndex < modules.length - 1) navigate(1);
                return;
            }

            completedSet.add(m.order_index);
            const newPct = Math.round((completedSet.size / modules.length) * 100);
            const nextMod = modules[currentIndex + 1]?.order_index ?? m.order_index;
            const xpEarned = m.duration_minutes * 5;

            // Show banner optimistically
            document.getElementById('xp-earned').textContent = `+${xpEarned} XP`;
            document.getElementById('completion-banner').classList.add('show');

            const btn = document.getElementById('complete-btn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            // 1. Save enrollment — filter by student_id + course_id only (never by id alone)
            //    This avoids silent failures if enrollment.id is undefined.
            const savePayload = {
                student_id: userId,
                course_id: courseId,
                progress_pct: newPct,
                current_module: nextMod,
                last_accessed: new Date().toISOString(),
            };

            let saveError = null;
            if (enrollment) {
                // UPDATE existing row using only student_id + course_id as filters
                const { error } = await supabaseClient
                    .from('enrollments')
                    .update({ progress_pct: newPct, current_module: nextMod, last_accessed: savePayload.last_accessed })
                    .eq('student_id', userId)
                    .eq('course_id', courseId);
                saveError = error;
                if (!error) { enrollment.progress_pct = newPct; enrollment.current_module = nextMod; }
            } else {
                // INSERT new enrollment row
                const { data, error } = await supabaseClient
                    .from('enrollments')
                    .insert(savePayload)
                    .select().single();
                saveError = error;
                enrollment = data;
            }

            if (saveError) {
                console.error('❌ Enrollment save failed:', saveError.message, saveError);
            } else {
                console.log('✅ Enrollment saved — progress_pct:', newPct);
            }

            // 2. Upsert profiles.xp — creates the row if missing, adds XP if it exists
            const { data: prof, error: profErr } = await supabaseClient
                .from('profiles').select('xp, full_name').eq('id', userId).single();
            if (profErr) console.error('❌ XP fetch failed:', profErr.message);
            const currentXP = prof?.xp ?? 0;
            const newXP = currentXP + xpEarned;
            const userName = prof?.full_name || window.LN_NAME || 'Learner';
            // Use upsert so the row is created if it doesn't exist yet
            const { error: xpErr } = await supabaseClient.from('profiles').upsert(
                { id: userId, full_name: userName, role: 'student', xp: newXP },
                { onConflict: 'id' }
            );
            if (xpErr) console.error('❌ XP upsert failed:', xpErr.message);
            else console.log('✅ XP upserted to', newXP);

            // Update banner with live XP total
            document.getElementById('xp-earned').textContent = `+${xpEarned} XP  •  Total: ${newXP.toLocaleString()} XP`;

            renderSidebar();

            const allDone = completedSet.size === modules.length;
            const isLast = currentIndex === modules.length - 1;

            if (isLast && allDone) {
                // Course-complete screen
                document.getElementById('completion-banner').innerHTML = `
                <div style="font-size:3rem;margin-bottom:var(--sp-3)">🏆</div>
                <h3 style="color:#fff;margin-bottom:var(--sp-2)">Course Complete!</h3>
                <p style="color:rgba(255,255,255,.85);font-size:var(--text-sm);margin-bottom:var(--sp-5)">
                    You've finished every module and earned<br>
                    <strong style="color:#6EE7B7;font-size:1.2em">${newXP.toLocaleString()} XP</strong> total!
                </p>
                <a href="student.html" class="btn btn-primary" style="display:inline-flex">← Back to Dashboard</a>`;
                document.getElementById('completion-banner').classList.add('show');
                btn.textContent = '🏆 Course Complete!';
                btn.disabled = true;
            } else {
                // Auto-advance to next module after 2.5s
                setTimeout(() => {
                    document.getElementById('completion-banner').classList.remove('show');
                    navigate(1);
                }, 2500);
                btn.textContent = 'Moving to next module…';
            }
        };

        // ── Scroll Tracking ───────────────────────────────────────────
        function setupScrollTracking() {
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const scrollFrac = docHeight > 0 ? scrollTop / docHeight : 1;
                const pct = Math.min(100, Math.round(scrollFrac * 100));

                document.getElementById('read-progress').style.width = pct + '%';

                // Auto-complete when user reads 90% — hasAutoCompleted resets per module
                if (pct >= 90 && !hasAutoCompleted && !completedSet.has(modules[currentIndex]?.order_index)) {
                    hasAutoCompleted = true;
                    markComplete();
                }
            });
        }
    </script>
</body>

</html>
