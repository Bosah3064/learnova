<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Courses — LearNova Teacher</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-guard.js"></script>
    <style>
        .dash-layout {
            display: flex;
            min-height: 100vh;
            padding-top: var(--nav-h);
        }

        .dash-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            position: sticky;
            top: var(--nav-h);
            height: calc(100vh - var(--nav-h));
            overflow-y: auto;
        }

        .dash-main {
            flex: 1;
            padding: var(--sp-8);
            background: var(--bg-page);
        }

        .sidebar-header {
            padding: var(--sp-6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }

        .sidebar-user-info strong {
            display: block;
            color: #fff;
            font-size: var(--text-sm);
            font-weight: 700;
        }

        .sidebar-user-info span {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.45);
        }

        .sidebar-nav {
            padding: var(--sp-4) var(--sp-3);
        }

        .sidebar-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            padding: var(--sp-4) var(--sp-3) var(--sp-2);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            padding: var(--sp-3);
            border-radius: var(--radius-md);
            color: rgba(255, 255, 255, 0.6);
            font-size: var(--text-sm);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .sidebar-link.active {
            background: var(--grad-emerald);
            color: #fff;
        }

        .sidebar-link .icon {
            width: 22px;
            text-align: center;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--sp-6);
            margin-top: var(--sp-6);
        }

        .course-card-teacher {
            background: var(--bg-card);
            border: 1px solid var(--bdr-subtle);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .course-card-teacher:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--bdr-accent);
        }

        .course-card-hero {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }

        .course-card-body {
            padding: var(--sp-5);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .course-card-title {
            font-size: var(--text-base);
            font-weight: 700;
            margin-bottom: var(--sp-2);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-card-meta {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            font-size: var(--text-xs);
            color: var(--txt-muted);
            margin-bottom: var(--sp-4);
        }

        .course-card-stats {
            border-top: 1px solid var(--bdr-subtle);
            padding-top: var(--sp-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-stat {
            text-align: center;
        }

        .course-stat strong {
            display: block;
            font-size: var(--text-base);
            color: var(--txt-primary);
        }

        .course-stat span {
            font-size: 10px;
            color: var(--txt-muted);
        }

        .course-actions {
            display: flex;
            gap: var(--sp-2);
            margin-top: var(--sp-4);
        }

        .filters-bar {
            display: flex;
            gap: var(--sp-4);
            align-items: center;
            margin-bottom: var(--sp-6);
            flex-wrap: wrap;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: var(--sp-3) var(--sp-4) var(--sp-3) var(--sp-10);
            background: var(--bg-card);
            border: 1px solid var(--bdr-subtle);
            border-radius: var(--radius-lg);
            color: var(--txt-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--clr-emerald);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--txt-muted);
        }
    </style>
</head>

<body>
    <script>(function () { const t = localStorage.getItem('ln-theme'); if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.setAttribute('data-theme', 'dark'); })();</script>

    <nav class="nav scrolled">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo no-select">
                <div class="logo-icon">🎓</div>Learn<span>Nova</span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle">🌙</button>
                <a href="student.html" class="btn btn-ghost btn-sm">Student View</a>
                <div class="avatar" style="background:linear-gradient(135deg,#10B981,#059669)" data-user-initials>JL
                </div>
            </div>
        </div>
    </nav>

    <div class="dash-layout">
        <aside class="dash-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user">
                    <div class="avatar avatar-lg" style="background:linear-gradient(135deg,#10B981,#059669)"
                        data-user-initials>JL</div>
                    <div class="sidebar-user-info">
                        <strong data-user-name>Instructor</strong>
                        <span>Teacher Dashboard</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Teach</div>
                <a href="teacher.html" class="sidebar-link"><span class="icon">📊</span>Dashboard</a>
                <a href="teacher-courses.html" class="sidebar-link active"><span class="icon">📚</span>My Courses</a>
                <a href="#" data-open-create-course class="sidebar-link"><span class="icon">➕</span>Create Course</a>
                <a href="teacher-students.html" class="sidebar-link"><span class="icon">👥</span>Students</a>
                <a href="teacher-sessions.html" class="sidebar-link"><span class="icon">📅</span>Sessions</a>
                <div class="sidebar-section-label">Business</div>
                <a href="teacher-revenue.html" class="sidebar-link"><span class="icon">💰</span>Revenue</a>
                <a href="#" onclick="signOut(); return false;" class="sidebar-link"><span class="icon">🚪</span>Sign
                    Out</a>
            </nav>
        </aside>

        <main class="dash-main">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-8)">
                <div>
                    <h1 style="font-size:var(--text-2xl);margin-bottom:4px">My Courses 📚</h1>
                    <p style="color:var(--txt-muted);font-size:var(--text-sm)">Manage and edit your course catalog.</p>
                </div>
                <button data-open-create-course class="btn btn-emerald">➕ Create New Course</button>
            </div>

            <div class="filters-bar">
                <div class="search-input-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search my courses..." id="course-search">
                </div>
                <select class="btn btn-ghost btn-sm" style="border:1px solid var(--bdr-subtle)">
                    <option>All Status</option>
                    <option>Published</option>
                    <option>Draft</option>
                </select>
                <select class="btn btn-ghost btn-sm" style="border:1px solid var(--bdr-subtle)">
                    <option>Newest First</option>
                    <option>Oldest First</option>
                    <option>Most Enrolled</option>
                </select>
            </div>

            <div id="courses-container" class="courses-grid">
                <!-- Loaded by JS -->
                <div style="text-align:center;padding:var(--sp-12);grid-column:1/-1;color:var(--txt-muted)">
                    <span style="display:inline-block;animation:spin 1s linear infinite;font-size:2rem">⏳</span>
                    <p style="margin-top:var(--sp-4)">Loading your courses...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Reused from teacher.html) -->
    <!-- ... Placeholder for now, logic will be shared ... -->

    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/teacher-dashboard.js"></script>
</body>

</html>
