<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Courses — LearNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-guard.js"></script>
    <style>
        .dash-layout {
            display: flex;
            min-height: 100vh;
            padding-top: var(--nav-h)
        }

        .dash-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            min-height: calc(100vh - var(--nav-h));
            display: flex;
            flex-direction: column;
            position: sticky;
            top: var(--nav-h);
            height: calc(100vh - var(--nav-h));
            overflow-y: auto
        }

        .dash-main {
            flex: 1;
            padding: var(--sp-8);
            background: var(--bg-page);
            overflow-x: hidden
        }

        .sidebar-header {
            padding: var(--sp-6);
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: var(--sp-3)
        }

        .sidebar-user-info strong {
            display: block;
            color: #fff;
            font-size: var(--text-sm);
            font-weight: 700
        }

        .sidebar-user-info span {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, .45)
        }

        .sidebar-nav {
            flex: 1;
            padding: var(--sp-4) var(--sp-3)
        }

        .sidebar-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3);
            padding: var(--sp-3) var(--sp-2) var(--sp-1)
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            padding: var(--sp-2) var(--sp-3);
            border-radius: var(--radius-md);
            color: rgba(255, 255, 255, .6);
            text-decoration: none;
            font-size: var(--text-sm);
            font-weight: 500;
            transition: all .18s;
            margin-bottom: 2px
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, .07);
            color: #fff
        }

        .sidebar-link.active {
            background: rgba(37, 99, 235, .25);
            color: var(--clr-electric)
        }

        .sidebar-link .icon {
            width: 20px;
            text-align: center
        }

        @media(max-width:1024px) {
            .dash-sidebar {
                display: none
            }
        }

        .filter-tabs {
            display: flex;
            gap: var(--sp-2);
            margin-bottom: var(--sp-6);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 4px;
            width: fit-content
        }

        .filter-tab {
            padding: var(--sp-2) var(--sp-4);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            color: var(--txt-muted);
            background: none;
            border: none;
            transition: all .2s
        }

        .filter-tab.active {
            background: var(--grad-primary);
            color: #fff
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--sp-5)
        }

        .course-item {
            background: var(--bg-card);
            border: 1px solid var(--bdr-subtle);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
            display: flex;
            flex-direction: column
        }

        .course-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg)
        }

        .course-thumb {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative
        }

        .course-body {
            padding: var(--sp-5);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--sp-3)
        }

        .course-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--txt-primary);
            line-height: 1.35
        }

        .course-meta {
            font-size: var(--text-xs);
            color: var(--txt-muted)
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: var(--sp-2)
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: var(--bdr-subtle);
            border-radius: 999px;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width .4s ease
        }

        .course-actions {
            display: flex;
            gap: var(--sp-2);
            margin-top: auto
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            position: absolute;
            top: 10px;
            left: 10px
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <a href="index.html" class="nav-logo"><span>Learn</span><span class="logo-accent">Nova</span></a>
        <div class="nav-actions">
            <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
            <div class="avatar avatar-sm" style="background:linear-gradient(135deg,#2563EB,#7C3AED)" data-user-initials>
                JD</div>
        </div>
    </nav>

    <div class="dash-layout">
        <aside class="dash-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user">
                    <div class="avatar avatar-lg" id="sb-avatar"
                        style="background:linear-gradient(135deg,#2563EB,#7C3AED);background-size:cover;background-position:center"
                        data-user-initials>JD</div>
                    <div class="sidebar-user-info"><strong data-user-name>Learner</strong><span
                            id="sidebar-level-label">Level 1 · Student</span></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Main</div>
                <a href="student.html" class="sidebar-link"><span class="icon">🏠</span>Dashboard</a>
                <a href="my-courses.html" class="sidebar-link active"><span class="icon">📚</span>My Courses</a>
                <a href="paths.html" class="sidebar-link"><span class="icon">🗺</span>Learning Paths</a>
                <a href="schedule.html" class="sidebar-link"><span class="icon">📅</span>Schedule</a>
                <div class="sidebar-section-label">Learn</div>
                <a href="ai-tutor.html" class="sidebar-link"><span class="icon">🤖</span>AI Tutor</a>
                <a href="mentors.html" class="sidebar-link"><span class="icon">👩‍💼</span>Find Mentor</a>
                <a href="certificates.html" class="sidebar-link"><span class="icon">🏆</span>Certificates</a>
                <a href="community.html" class="sidebar-link"><span class="icon">🌍</span>Community</a>
                <div class="sidebar-section-label">Account</div>
                <a href="profile.html" class="sidebar-link"><span class="icon">👤</span>Profile</a>
                <a href="#" class="sidebar-link"><span class="icon">⚙️</span>Settings</a>
                <a href="#" onclick="signOut();return false;" class="sidebar-link"><span class="icon">🚪</span>Sign
                    Out</a>
            </nav>
        </aside>

        <main class="dash-main">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6)">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:800;color:var(--txt-primary)">📚 My Courses</h1>
                    <p style="color:var(--txt-muted);font-size:var(--text-sm);margin-top:var(--sp-1)" id="course-count">
                        Loading…</p>
                </div>
                <a href="index.html#courses" class="btn btn-primary btn-sm">+ Explore More</a>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterCourses('all',this)">All Courses</button>
                <button class="filter-tab" onclick="filterCourses('active',this)">In Progress</button>
                <button class="filter-tab" onclick="filterCourses('done',this)">Completed</button>
            </div>

            <div class="courses-grid" id="courses-grid">
                <div style="color:var(--txt-muted);grid-column:1/-1;text-align:center;padding:var(--sp-12)">⏳ Loading
                    courses…</div>
            </div>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script>
        let allEnrollments = [];

        (async function () {
            await new Promise(r => { if (window.LN_USER) return r(); const t = setInterval(() => { if (window.LN_USER) { clearInterval(t); r(); } }, 50); setTimeout(() => { clearInterval(t); r(); }, 5000); });
            const userId = window.LN_USER?.id;
            if (!userId) return;

            // Load sidebar level
            const { data: prof } = await supabaseClient.from('profiles').select('xp,role,avatar_url,full_name').eq('id', userId).single();
            if (prof) {
                const lv = Math.floor((prof.xp || 0) / 500) + 1;
                const sl = document.getElementById('sidebar-level-label');
                if (sl) sl.textContent = `${prof.role === 'teacher' ? 'Instructor' : 'Student'} · Level ${lv}`;
                if (prof.avatar_url) { const a = document.getElementById('sb-avatar'); if (a) { a.style.backgroundImage = `url(${prof.avatar_url})`; a.textContent = ''; } }
            }

            const { data: enrollments } = await supabaseClient.from('enrollments').select(`id, progress_pct, current_module, last_accessed, courses(id, title, instructor_name, thumbnail_emoji, thumbnail_bg, badge_color, category, modules_count, duration_hours, rating)`).eq('student_id', userId).order('last_accessed', { ascending: false });

            allEnrollments = enrollments || [];
            document.getElementById('course-count').textContent = `${allEnrollments.length} enrolled course${allEnrollments.length !== 1 ? 's' : ''}`;
            renderCourses(allEnrollments);
        })();

        function filterCourses(filter, btn) {
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = filter === 'active' ? allEnrollments.filter(e => e.progress_pct > 0 && e.progress_pct < 100)
                : filter === 'done' ? allEnrollments.filter(e => e.progress_pct >= 100)
                    : allEnrollments;
            renderCourses(filtered);
        }

        function renderCourses(list) {
            const grid = document.getElementById('courses-grid');
            if (!list.length) { grid.innerHTML = `<div style="color:var(--txt-muted);grid-column:1/-1;text-align:center;padding:var(--sp-12)"><div style="font-size:3rem;margin-bottom:var(--sp-3)">📭</div><p>No courses in this category yet.</p><a href="index.html#courses" class="btn btn-primary btn-sm" style="margin-top:var(--sp-4)">Browse Courses</a></div>`; return; }
            const fillCol = pct => pct >= 100 ? '#10B981' : pct >= 50 ? 'var(--clr-electric)' : 'var(--clr-amber)';
            grid.innerHTML = list.map(e => {
                const c = e.courses;
                const pct = e.progress_pct;
                const isDone = pct >= 100;
                const lastStudied = e.last_accessed ? relTime(e.last_accessed) : 'Not started';
                return `<div class="course-item">
      <div class="course-thumb" style="background:${c.thumbnail_bg}">
        ${c.thumbnail_emoji}
        <span class="badge-pill" style="background:rgba(0,0,0,.4);color:#fff">${c.category}</span>
        ${isDone ? '<span class="badge-pill" style="left:auto;right:10px;background:#10B981;color:#fff">✓ Done</span>' : ''}
      </div>
      <div class="course-body">
        <div class="course-title">${c.title}</div>
        <div class="course-meta">👤 ${c.instructor_name} · ${c.modules_count} modules · ⭐ ${c.rating}</div>
        <div class="progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${fillCol(pct)}"></div></div>
          <span style="font-size:var(--text-xs);font-weight:700;color:${fillCol(pct)};min-width:34px">${pct}%</span>
        </div>
        <div class="course-meta">Module ${e.current_module}/${c.modules_count} · Last studied ${lastStudied}</div>
        <div class="course-actions">
          ${isDone
                        ? `<a href="certificates.html" class="btn btn-secondary btn-sm" style="flex:1;justify-content:center">🏆 Certificate</a>`
                        : `<a href="course-reader.html?course=${c.id}&module=${e.current_module}" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">▶ Continue</a>`}
        </div>
      </div>
    </div>`;
            }).join('');
        }

        function relTime(iso) {
            const m = Math.floor((Date.now() - new Date(iso)) / 60000);
            if (m < 2) return 'just now'; if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
            const d = Math.floor(h / 24); return d === 1 ? 'yesterday' : d + 'd ago';
        }
    </script>
</body>

</html>
